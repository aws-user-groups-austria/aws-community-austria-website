<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 576" fill="none">
  <rect width="1024" height="576" fill="transparent"/>
  <!-- Hexagon badge -->
  <g transform="translate(100, 48) scale(0.42)">
    <!-- Outer hexagon stroke -->
    <polygon points="500,30 920,270 920,730 500,970 80,730 80,270" fill="none" stroke="#A66FF0" stroke-width="28" stroke-linejoin="round"/>
    <!-- Inner hexagon fill -->
    <polygon points="500,60 895,285 895,715 500,940 105,715 105,285" fill="#1E2538"/>
    <!-- Stars/sparkles -->
    <text x="320" y="200" fill="#A66FF0" font-size="48" font-family="sans-serif">✦</text>
    <text x="500" y="160" fill="#A66FF0" font-size="36" font-family="sans-serif">✦</text>
    <text x="650" y="210" fill="#A66FF0" font-size="28" font-family="sans-serif">✦</text>
    <!-- Clouds -->
    <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round">
      <path d="M680,280 Q700,260 720,280 Q740,260 760,280"/>
      <path d="M200,750 Q230,730 260,750 Q290,730 320,750"/>
    </g>
    <!-- Small cross sparkles -->
    <g stroke="white" stroke-width="5" stroke-linecap="round">
      <line x1="260" y1="230" x2="260" y2="260"/><line x1="245" y1="245" x2="275" y2="245"/>
      <line x1="720" y1="700" x2="720" y2="730"/><line x1="705" y1="715" x2="735" y2="715"/>
    </g>
    <!-- Linz New Cathedral (Neuer Dom) - simplified illustration -->
    <g transform="translate(500, 500)" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
      <!-- Main spire (tall center) -->
      <line x1="0" y1="-320" x2="0" y2="-120"/>
      <polygon points="-8,-320 0,-360 8,-320"/>
      <!-- Spire cross -->
      <line x1="-8" y1="-350" x2="8" y2="-350"/>
      <!-- Main cathedral body -->
      <rect x="-160" y="-120" width="320" height="280" rx="4"/>
      <!-- Roof -->
      <polygon points="-180,-120 0,-220 180,-120"/>
      <!-- Side towers -->
      <rect x="-180" y="-160" width="50" height="320" rx="2"/>
      <rect x="130" y="-160" width="50" height="320" rx="2"/>
      <!-- Tower tops -->
      <polygon points="-180,-160 -155,-200 -130,-160"/>
      <polygon points="130,-160 155,-200 180,-160"/>
      <!-- Main entrance -->
      <path d="M-30,160 L-30,80 Q0,50 30,80 L30,160"/>
      <!-- Windows row 1 -->
      <path d="M-100,0 L-100,-40 Q-80,-60 -60,-40 L-60,0"/>
      <path d="M-15,0 L-15,-40 Q0,-60 15,-40 L15,0"/>
      <path d="M60,0 L60,-40 Q80,-60 100,-40 L100,0"/>
      <!-- Rose window -->
      <circle cx="0" cy="-160" r="28"/>
      <circle cx="0" cy="-160" r="14"/>
    </g>
  </g>
  <!-- Text -->
  <text x="560" y="200" fill="#A66FF0" font-family="'Inter', Arial, sans-serif" font-size="42" font-weight="400" font-style="italic">AWS</text>
  <text x="560" y="310" fill="#A66FF0" font-family="'Inter', Arial, sans-serif" font-size="110" font-weight="700">User Group</text>
  <text x="560" y="400" fill="#A66FF0" font-family="'Inter', Arial, sans-serif" font-size="52" font-weight="400">Linz / Austria</text>
</svg>